version: '3.8'

services:
  synology-tool:
    image: syn-tool
    container_name: syn-tool
    ports:
      - "9000:9000"
    volumes:
      # Persistent data (Excel uploads, edit history, settings)
      - ./data:/app/data
      # NAS volumes for share scanning
      - /volume1:/volume1:ro
      # - /volume2:/volume2:ro
      # btrfs binary from host — avoids installing btrfs-progs during image build
      # (Synology kernel doesn't support seccomp, which apt-get requires)
      - /sbin/btrfs:/usr/sbin/btrfs:ro
    environment:
      - PORT=9000
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
    # Required for btrfs subvolume/qgroup commands (accurate share sizes)
    privileged: true
    restart: unless-stopped
