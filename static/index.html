<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synology Storage Tool</title>
<style>
/* ===================== RESET & BASE ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sidebar-bg:  #1e293b; --sidebar-text: #94a3b8; --sidebar-act: #3b82f6;
  --primary:     #3b82f6; --primary-h:    #2563eb;
  --success:     #22c55e; --warning:      #f59e0b; --danger: #ef4444;
  --bg:          #f1f5f9; --card-bg:      #ffffff;
  --text:        #1e293b; --muted:        #64748b; --border: #e2e8f0;
  --radius:      8px;
  --shadow:      0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:   0 4px 16px rgba(0,0,0,.12);
}
html,body { height:100%; font-family:system-ui,-apple-system,sans-serif; font-size:14px; color:var(--text); }
button { cursor:pointer; font-family:inherit; font-size:13px; border:none; border-radius:var(--radius); padding:6px 14px; transition:background .15s,opacity .15s; }
button:disabled { opacity:.5; cursor:not-allowed; }
input,select { font-family:inherit; font-size:13px; border:1px solid var(--border); border-radius:var(--radius); padding:5px 9px; outline:none; }
input:focus,select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(59,130,246,.15); }

/* ===================== LAYOUT ===================== */
#app { display:flex; height:100vh; overflow:hidden; }

/* ---- SIDEBAR ---- */
.sidebar { width:220px; flex-shrink:0; background:var(--sidebar-bg); display:flex; flex-direction:column; }
.sidebar-brand { padding:20px 18px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid rgba(255,255,255,.06); }
.sidebar-brand svg { width:26px; height:26px; flex-shrink:0; }
.sidebar-brand span { color:#f8fafc; font-weight:600; font-size:15px; line-height:1.2; }
.nav-list { list-style:none; padding:12px 0; flex:1; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 18px; color:var(--sidebar-text); cursor:pointer; border-left:3px solid transparent; transition:background .15s,color .15s; user-select:none; }
.nav-item:hover { background:rgba(255,255,255,.05); color:#f8fafc; }
.nav-item.active { background:rgba(59,130,246,.15); color:#f8fafc; border-left-color:var(--sidebar-act); }
.nav-item svg { width:16px; height:16px; flex-shrink:0; }
.sidebar-footer { padding:12px 18px; border-top:1px solid rgba(255,255,255,.06); display:flex; align-items:center; gap:6px; }
.lang-btn { background:transparent; color:var(--sidebar-text); border:1px solid rgba(255,255,255,.2); border-radius:4px; padding:3px 9px; font-size:12px; }
.lang-btn.active { background:var(--sidebar-act); color:#fff; border-color:var(--sidebar-act); }

/* ---- MAIN ---- */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
.main-header { padding:16px 24px; background:var(--card-bg); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.main-header h1 { font-size:18px; font-weight:600; }
.header-actions { display:flex; gap:8px; align-items:center; }
.content-area { flex:1; overflow-y:auto; padding:24px; }

/* ===================== TABS ===================== */
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ===================== CARDS ===================== */
.card { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:20px; }
.card-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.card-title { font-weight:600; font-size:14px; }
.card-body { padding:18px; }

/* ===================== STATS ===================== */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:20px; }
.stat-card { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; }
.stat-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.stat-value { font-size:24px; font-weight:700; }
.stat-sub { font-size:12px; color:var(--muted); margin-top:3px; }

/* ===================== SORTABLE TABLES ===================== */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed; }
thead th { text-align:left; padding:9px 12px; background:#f8fafc; border-bottom:2px solid var(--border); font-weight:600; color:var(--muted); white-space:nowrap; font-size:12px; text-transform:uppercase; letter-spacing:.4px; position:relative; cursor:pointer; user-select:none; overflow:hidden; }
thead th:hover { background:#f1f5f9; }
thead th.no-sort { cursor:default; }
.th-inner { display:flex; align-items:center; gap:4px; overflow:hidden; }
.th-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
.sort-icon { font-size:10px; flex-shrink:0; opacity:.35; }
th.sort-asc .sort-icon, th.sort-desc .sort-icon { opacity:1; color:var(--primary); }
.resize-handle { position:absolute; right:0; top:0; bottom:0; width:5px; cursor:col-resize; z-index:2; }
.resize-handle:hover { background:var(--primary); opacity:.35; }
tbody tr { border-bottom:1px solid var(--border); }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:#f8fafc; }
tbody td { padding:8px 12px; vertical-align:middle; overflow:hidden; }
.cell-mono { font-family:monospace; font-size:12px; }
.cell-muted { color:var(--muted); font-size:12px; }

/* Progress bar */
.bar-wrap { min-width:90px; }
.bar-bg { height:6px; background:#e2e8f0; border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width .3s; }

/* ===================== BUTTONS ===================== */
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-h); }
.btn-secondary { background:#e2e8f0; color:var(--text); }
.btn-secondary:hover { background:#cbd5e1; }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { filter:brightness(.92); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { filter:brightness(.92); }
.btn-sm { padding:4px 10px; font-size:12px; }
.btn-icon { background:transparent; color:var(--muted); padding:4px; border-radius:4px; }
.btn-icon:hover { background:var(--border); color:var(--text); }

/* ===================== EXCEL TABLE ===================== */
.excel-toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
.dirty-badge { background:var(--warning); color:#fff; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; }
.excel-meta { font-size:12px; color:var(--muted); margin-bottom:12px; }
.excel-table input { border:1px solid transparent; background:transparent; width:100%; padding:2px 4px; }
.excel-table input:focus { border-color:var(--primary); background:#fff; }
.excel-table .col-calc { background:#f8fafc; color:var(--muted); font-style:italic; text-align:right; white-space:nowrap; }
.cell-with-unit { display:flex; align-items:center; gap:4px; }
.cell-unit { color:var(--muted); font-size:11px; flex-shrink:0; }
.col-nas select { min-width:130px; font-size:12px; padding:2px 6px; }
.row-delete { color:var(--danger); opacity:.5; }
.row-delete:hover { opacity:1; background:#fef2f2; }
.row-synced td { animation:flash-green .6s ease; }
@keyframes flash-green { 0%,100%{background:transparent} 50%{background:#dcfce7} }

/* ===================== HISTORY ===================== */
.history-tabs { display:flex; gap:0; margin-bottom:18px; border-bottom:2px solid var(--border); }
.htab { padding:8px 18px; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-2px; }
.htab.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:600; }
.history-list { display:flex; flex-direction:column; gap:10px; }
.history-item { display:flex; align-items:flex-start; justify-content:space-between; padding:12px 16px; background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); gap:12px; }
.history-item:hover { border-color:var(--primary); }
.history-info { flex:1; min-width:0; }
.history-title { font-weight:600; font-size:13px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.history-sub { font-size:12px; color:var(--muted); }
.history-actions { display:flex; gap:6px; flex-shrink:0; align-items:center; }

/* ===================== SETTINGS ===================== */
.settings-section { margin-bottom:24px; }
.settings-section h3 { font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px; }
.form-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.form-label { width:210px; color:var(--muted); }
.list-item { display:flex; gap:8px; align-items:center; margin-bottom:6px; }
.list-item span { flex:1; font-family:monospace; font-size:13px; background:#f8fafc; border:1px solid var(--border); border-radius:var(--radius); padding:5px 9px; }

/* ===================== MODALS ===================== */
.modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:1000; }
.modal-backdrop.hidden { display:none; }
.modal-box { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow-lg); padding:24px; max-width:420px; width:90%; }
.modal-box h3 { margin-bottom:10px; font-size:16px; }
.modal-box p { color:var(--muted); margin-bottom:20px; line-height:1.5; }
.modal-actions { display:flex; justify-content:flex-end; gap:8px; }

/* MAPPING DIFF MODAL */
.diff-modal-box { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow-lg); padding:24px; max-width:640px; width:95%; max-height:85vh; display:flex; flex-direction:column; }
.diff-modal-box h3 { margin-bottom:4px; }
.diff-modal-box > p { color:var(--muted); font-size:13px; margin-bottom:16px; }
.diff-scroll { flex:1; overflow-y:auto; }
.diff-section { margin-bottom:16px; }
.diff-section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.diff-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius); margin-bottom:6px; background:#fafafa; }
.diff-item-name { flex:1; font-size:13px; min-width:0; }
.diff-item-name small { display:block; color:var(--muted); font-size:11px; }
.diff-item select { font-size:12px; min-width:140px; }
.diff-applied .diff-section-title { color:var(--success); }
.diff-new     .diff-section-title { color:var(--primary); }
.diff-removed .diff-section-title { color:var(--danger); }
.diff-changed .diff-section-title { color:var(--warning); }
.diff-applied .diff-item { border-color:#bbf7d0; background:#f0fdf4; }
.diff-new     .diff-item { border-color:#bfdbfe; background:#eff6ff; }
.diff-removed .diff-item { border-color:#fecaca; background:#fef2f2; }
.diff-changed .diff-item { border-color:#fde68a; background:#fffbeb; }

/* ===================== TAGS & TOASTS ===================== */
.tag { display:inline-block; font-size:11px; padding:2px 7px; border-radius:10px; font-weight:600; }
.tag-upload  { background:#dbeafe; color:#1d4ed8; }
.tag-edit    { background:#dcfce7; color:#166534; }
.tag-restore { background:#fef9c3; color:#854d0e; }
#toasts { position:fixed; bottom:24px; right:24px; display:flex; flex-direction:column; gap:8px; z-index:2000; }
.toast { background:var(--text); color:#fff; padding:10px 18px; border-radius:var(--radius); box-shadow:var(--shadow-lg); font-size:13px; max-width:320px; opacity:1; transition:opacity .3s; }
.toast.success { background:var(--success); }
.toast.error   { background:var(--danger); }
.toast.warning { background:var(--warning); }
.toast.fading  { opacity:0; }
.empty-state { text-align:center; padding:40px 24px; color:var(--muted); }
@keyframes spin { to { transform:rotate(360deg); } }
.spinner { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; vertical-align:middle; flex-shrink:0; }
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
        <rect x="2" y="3" width="20" height="5" rx="1"/><rect x="2" y="10" width="20" height="5" rx="1"/>
        <rect x="2" y="17" width="20" height="5" rx="1"/>
        <circle cx="18" cy="5.5" r="1" fill="#3b82f6" stroke="none"/>
        <circle cx="18" cy="12.5" r="1" fill="#3b82f6" stroke="none"/>
      </svg>
      <span data-i18n="brand"></span>
    </div>
    <ul class="nav-list">
      <li class="nav-item active" data-tab="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span data-i18n="nav_dashboard"></span>
      </li>
      <li class="nav-item" data-tab="excel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span data-i18n="nav_excel"></span>
      </li>
      <li class="nav-item" data-tab="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 108.83-7A9 9 0 003 11"/><polyline points="3 4 3 11 10 11"/></svg>
        <span data-i18n="nav_history"></span>
      </li>
      <li class="nav-item" data-tab="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span data-i18n="nav_settings"></span>
      </li>
    </ul>
    <div class="sidebar-footer">
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-nl" onclick="setLang('nl')">NL</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <h1 id="page-title"></h1>
      <div class="header-actions" id="header-actions"></div>
    </div>
    <div class="content-area">

      <!-- ========== DASHBOARD ========== -->
      <div id="tab-dashboard" class="tab-content active">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label" data-i18n="stat_total"></div><div class="stat-value" id="stat-total">—</div><div class="stat-sub" id="stat-total-sub"></div></div>
          <div class="stat-card"><div class="stat-label" data-i18n="stat_count"></div><div class="stat-value" id="stat-count">—</div></div>
          <div class="stat-card"><div class="stat-label" data-i18n="stat_largest"></div><div class="stat-value" id="stat-largest">—</div><div class="stat-sub" id="stat-largest-name"></div></div>
          <div class="stat-card"><div class="stat-label" data-i18n="stat_excel_rows"></div><div class="stat-value" id="stat-excel-rows">—</div></div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="nas_shares"></span>
            <div style="display:flex;gap:8px;align-items:center">
              <span id="shares-updated" style="font-size:12px;color:var(--muted)"></span>
              <button class="btn-secondary btn-sm" onclick="loadShares()" data-i18n="refresh"></button>
            </div>
          </div>
          <div class="card-body" style="padding:0">
            <div class="table-wrap">
              <table id="shares-table">
                <thead><tr>
                  <th onclick="sortSharesBy('name')"    style="width:160px"><div class="th-inner"><span class="th-text" data-i18n="col_name"></span><span class="sort-icon">↕</span></div></th>
                  <th onclick="sortSharesBy('path')"    style="width:200px"><div class="th-inner"><span class="th-text" data-i18n="col_path"></span><span class="sort-icon">↕</span></div></th>
                  <th onclick="sortSharesBy('size_bytes')" style="width:100px"><div class="th-inner"><span class="th-text" data-i18n="col_size"></span><span class="sort-icon">↕</span></div></th>
                  <th onclick="sortSharesBy('size_gb')" style="width:90px"><div class="th-inner"><span class="th-text" data-i18n="col_gb"></span><span class="sort-icon">↕</span></div></th>
                  <th class="no-sort" style="width:160px"><div class="th-inner"><span class="th-text" data-i18n="col_usage"></span></div></th>
                </tr></thead>
                <tbody id="shares-body"><tr><td colspan="5" class="empty-state" data-i18n="loading"></td></tr></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- ========== EXCEL ========== -->
      <div id="tab-excel" class="tab-content">
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="nav_excel"></span></div>
          <div class="card-body">
            <div class="excel-toolbar">
              <label class="btn-primary" style="padding:6px 14px;border-radius:var(--radius);color:#fff;background:var(--primary);cursor:pointer">
                <span data-i18n="upload_excel"></span>
                <input type="file" id="excel-file-input" accept=".xlsx,.xls" style="display:none" onchange="handleUpload(this)">
              </label>
              <button class="btn-success" onclick="exportExcel()" data-i18n="export_excel"></button>
              <button class="btn-primary" id="save-btn" onclick="saveExcel()" disabled data-i18n="save"></button>
              <button class="btn-secondary" id="sync-btn" onclick="syncFromNAS()" disabled data-i18n="sync_from_nas"></button>
              <button class="btn-secondary btn-sm" onclick="addRow()" data-i18n="add_row"></button>
              <span class="dirty-badge" id="dirty-badge" style="display:none" data-i18n="unsaved"></span>
            </div>
            <div class="excel-meta" id="excel-meta"></div>
            <div class="table-wrap">
              <table class="excel-table" id="excel-table">
                <thead id="excel-thead"></thead>
                <tbody id="excel-tbody"><tr><td colspan="10" class="empty-state" data-i18n="no_data"></td></tr></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- ========== HISTORY ========== -->
      <div id="tab-history" class="tab-content">
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="version_history"></span></div>
          <div class="card-body">
            <div class="history-tabs">
              <div class="htab active" onclick="showHistoryTab('uploads',this)" data-i18n="uploads_tab"></div>
              <div class="htab" onclick="showHistoryTab('edits',this)" data-i18n="edits_tab"></div>
              <div class="htab" onclick="showHistoryTab('mappings',this)" data-i18n="mappings_tab"></div>
            </div>
            <div id="history-uploads"  class="history-list"></div>
            <div id="history-edits"    class="history-list" style="display:none"></div>
            <div id="history-mappings" class="history-list" style="display:none"></div>
          </div>
        </div>
      </div>

      <!-- ========== SETTINGS ========== -->
      <div id="tab-settings" class="tab-content">
        <div class="card"><div class="card-body">
          <div class="settings-section">
            <h3 data-i18n="share_paths"></h3>
            <div id="share-paths-list"></div>
            <div style="display:flex;gap:8px;margin-top:8px">
              <input id="new-share-path" placeholder="/volume1" style="flex:1">
              <button class="btn-secondary" onclick="addSharePath()" data-i18n="add"></button>
            </div>
          </div>
          <div class="settings-section">
            <h3 data-i18n="exclude_shares"></h3>
            <div id="exclude-list"></div>
            <div style="display:flex;gap:8px;margin-top:8px">
              <input id="new-exclude" placeholder="@eaDir">
              <button class="btn-secondary" onclick="addExclude()" data-i18n="add"></button>
            </div>
          </div>
          <div class="settings-section">
            <h3 data-i18n="billing_formula"></h3>
            <div class="form-row">
              <label class="form-label" data-i18n="mailbox_gb_label"></label>
              <input type="number" id="mailbox-gb" min="0" step="0.5" style="width:90px">
              <span style="color:var(--muted);font-size:12px;margin-left:6px">= <span data-i18n="factur_formula_hint"></span></span>
            </div>
          </div>
          <div class="settings-section">
            <h3 data-i18n="retention"></h3>
            <div class="form-row">
              <label class="form-label" data-i18n="upload_ret_label"></label>
              <select id="upload-retention">
                <option value="5">5</option><option value="10">10</option>
                <option value="20">20</option><option value="50">50</option>
              </select>
            </div>
            <div class="form-row">
              <label class="form-label" data-i18n="edit_ret_label"></label>
              <select id="edit-retention">
                <option value="5">5</option><option value="10">10</option>

let lang = 'en';

function t(key, vars) {
  let s = (LANG[lang] || LANG.en)[key] || key;
  if (vars) Object.entries(vars).forEach(([k, v]) => { s = s.replace(`{${k}}`, v); });
  return s;
}

function getLangFromEnv() {
  // 1. Cookie
  const m = document.cookie.match(/(?:^|;\s*)lang=([a-z]+)/);
  if (m) return m[1];
  // 2. Browser/OS language
  const bl = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  return bl.startsWith('nl') ? 'nl' : 'en';
}

function setLang(l) {
  lang = l;
  document.cookie = `lang=${l};path=/;max-age=31536000`;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-nl').classList.toggle('active', l === 'nl');
  applyI18n();
  reRenderCurrentTab();
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (el.tagName === 'INPUT') el.placeholder = t(key);
    else el.textContent = t(key);
  });
  // Nav items (the brand span has \n in it)
  const brand = document.querySelector('.sidebar-brand span[data-i18n="brand"]');
  if (brand) brand.innerHTML = t('brand').replace('\n','<br>');
}

function reRenderCurrentTab() {
  const active = document.querySelector('.nav-item.active');
  if (!active) return;
  const tab = active.dataset.tab;
  document.getElementById('page-title').textContent = t(`nav_${tab}`);
  if (tab === 'dashboard') renderShares();
  if (tab === 'excel')     renderExcel();
  if (tab === 'history')   renderHistory();
  if (tab === 'settings')  renderSettings();
}

// ===================== STATE =====================
const S = {
  shares: [], volumes: {}, scanStream: null, sharesUpdatedAt: null,
  shareSort: { col: 'size_bytes', dir: 'desc' },
  excel:  { headers: [], rows: [], _meta: {} },
  editBuffer: [],
  dirty: false,
  sortCol: null, sortDir: 'asc',
  colWidths: {},
  history: { uploads: [], edits: [], mappings: [] },
  settings: {},
  mappings: { key_col: null, map: {} },
  pendingDiff: null,
};

// ===================== UTILS =====================
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtBytes(b) {
  const u = ['B','KB','MB','GB','TB']; let i = 0;
  while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; }
  return `${b.toFixed(i >= 3 ? 2 : 1)} ${u[i]}`;
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString(lang === 'nl' ? 'nl-NL' : 'en-GB');
}
function setDirty(v) {
  S.dirty = v;
  document.getElementById('dirty-badge').style.display = v ? '' : 'none';
  document.getElementById('save-btn').disabled = !v;
}
function isStorageCol(header) {
  const h = (header || '').toLowerCase();
  return h.includes('opslag') || h.includes('storage') || h.includes('gebruik') ||
         h.includes('factuur') || h.includes('factureren') || h.includes('invoice');
}
function getUnit(header) { return isStorageCol(header) ? 'GB' : ''; }
function findCol(headers, ...kws) {
  return headers.find(h => kws.some(k => h.toLowerCase().includes(k))) ?? null;
}
function getVolumeTotal(sharePath) {
  for (const [vol, info] of Object.entries(S.volumes)) {
    if (sharePath.startsWith(vol + '/') || sharePath === vol) return info.total_bytes;
  }
  return null;
}

// ===================== TOAST =====================
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.classList.add('fading'); setTimeout(() => el.remove(), 320); }, 3200);
}

// ===================== MODAL =====================
function showConfirm(title, msg, onOk) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent  = msg;
  document.getElementById('modal').classList.remove('hidden');
  const btn = document.getElementById('modal-confirm');
  btn.onclick = () => { closeModal(); onOk(); };
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

// ===================== API =====================
async function GET(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function POST(url, data) {
  const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
  if (!r.ok) { const e = await r.json().catch(()=>({error:'Unknown error'})); throw new Error(e.error || `HTTP ${r.status}`); }
  return r.json();
}
async function UPLOAD(url, fd) {
  const r = await fetch(url, { method:'POST', body:fd });
  if (!r.ok) { const e = await r.json().catch(()=>({error:'Unknown error'})); throw new Error(e.error || `HTTP ${r.status}`); }
  return r.json();
}

// ===================== TABS =====================
function showTab(tab) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.toggle('active', el.id === `tab-${tab}`));
  document.getElementById('page-title').textContent = t(`nav_${tab}`);
  document.getElementById('header-actions').innerHTML = '';
  if (tab === 'dashboard') loadShares();
  if (tab === 'excel')     loadExcel();
  if (tab === 'history')   loadHistory();
  if (tab === 'settings')  loadSettings();
}

// ===================== DASHBOARD =====================
function renderScanProgress(done, total, warnings) {
  const cell = document.getElementById('scan-progress-cell');
  if (!cell) return;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const color = pct === 100 ? 'var(--success)' : 'var(--primary)';
  cell.innerHTML = `<div style="padding:16px 12px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div class="spinner"></div>
      <span style="font-size:13px;color:var(--muted);flex:1">${t('scanning', {done, total: total || '…'})}</span>
      <span style="font-size:12px;color:var(--muted)">${total ? pct + '%' : ''}</span>
    </div>
    <div class="bar-bg" style="height:8px">
      <div class="bar-fill" style="width:${pct}%;background:${color};transition:width .25s"></div>
    </div>
    ${warnings.length ? `<div style="margin-top:8px;font-size:12px;color:var(--warning)">⚠ ${esc(warnings[warnings.length - 1])}</div>` : ''}
  </div>`;
}

async function loadShares() {
  if (S.scanStream) { S.scanStream.close(); S.scanStream = null; }
  S.shares = [];

  // Show cached results immediately so the page isn't empty on refresh
  try {
    const cached = await GET('/api/shares/cached');
    if (cached.shares && cached.shares.length) {
      S.shares         = cached.shares;
      S.volumes        = cached.volumes || {};
      S.sharesUpdatedAt = cached.scanned_at || null;
      renderShares();
    }
  } catch(_) {}

  // Prepend progress row above any cached rows (or replace if nothing cached)
  const body = document.getElementById('shares-body');
  const progressRow = `<tr><td colspan="5" id="scan-progress-cell"></td></tr>`;
  if (S.shares.length) {
    body.insertAdjacentHTML('afterbegin', progressRow);
  } else {
    body.innerHTML = progressRow;
  }
  renderScanProgress(0, 0, []);

  if (!window.EventSource) {
    try {
      const d = await GET('/api/shares');
      S.shares = d.shares; S.volumes = d.volumes || {};
      _onScanDone([]);
    } catch(e) {
      document.getElementById('shares-body').innerHTML =
        `<tr><td colspan="5" style="color:var(--danger);padding:16px">Error: ${esc(e.message)}</td></tr>`;
    }
    return;
  }

  const warnings = [];
  const es = new EventSource('/api/shares/stream');
  S.scanStream = es;

  es.onmessage = ev => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'total') {
      S.shares = [];   // clear cached data, build fresh list from stream
      renderScanProgress(0, msg.count, warnings);
    } else if (msg.type === 'share') {
      S.shares.push(msg.share);
      if (msg.warning) warnings.push(`${msg.share.name}: ${msg.warning}`);
      renderScanProgress(msg.done, msg.total, warnings);
    } else if (msg.type === 'error') {
      warnings.push(msg.message);
      renderScanProgress(S.shares.length, S.shares.length || 1, warnings);
    } else if (msg.type === 'done') {
      S.volumes = msg.volumes || {};
      S.scanStream = null; es.close();
      _onScanDone(warnings);
    }
  };

  es.onerror = () => {
    if (S.scanStream) { S.scanStream.close(); S.scanStream = null; }
    if (!S.shares.length) {
      document.getElementById('shares-body').innerHTML =
        `<tr><td colspan="5" style="color:var(--danger);padding:16px">${t('scan_error')}Connection lost</td></tr>`;
    } else {
      _onScanDone(warnings);
    }
  };
}

function _onScanDone(warnings) {
  S.sharesUpdatedAt = new Date().toISOString();
  renderShares();
  warnings.forEach(w => toast(w, 'warning'));
  document.getElementById('sync-btn').disabled = !S.shares.length || !S.editBuffer.length;
}

function sortSharesBy(col) {
  if (S.scanStream) return;   // sorting disabled while scan is in progress
  if (S.shareSort.col === col) S.shareSort.dir = S.shareSort.dir === 'asc' ? 'desc' : 'asc';
  else { S.shareSort.col = col; S.shareSort.dir = col === 'size_bytes' || col === 'size_gb' ? 'desc' : 'asc'; }
  renderShares();
}

function renderShares() {
  const shares = [...S.shares].sort((a, b) => {
    const va = a[S.shareSort.col] ?? '', vb = b[S.shareSort.col] ?? '';
    const na = parseFloat(va), nb = parseFloat(vb);
    let cmp = (!isNaN(na) && !isNaN(nb)) ? na - nb : String(va).localeCompare(String(vb));
    return S.shareSort.dir === 'asc' ? cmp : -cmp;
  });

  const updEl = document.getElementById('shares-updated');
  if (updEl) updEl.textContent = S.sharesUpdatedAt ? t('updated') + ': ' + fmtDate(S.sharesUpdatedAt) : '';

  const totalB = shares.reduce((s, x) => s + x.size_bytes, 0);
  document.getElementById('stat-total').textContent  = fmtBytes(totalB);
  document.getElementById('stat-count').textContent  = shares.length;
  document.getElementById('stat-excel-rows').textContent = S.editBuffer.length || (S.excel.rows ? S.excel.rows.length : '—');
  if (shares.length) {
    // largest by bytes (always from sorted-by-size perspective)
    const biggest = [...S.shares].sort((a,b) => b.size_bytes - a.size_bytes)[0];
    document.getElementById('stat-largest').textContent     = biggest.size_human;
    document.getElementById('stat-largest-name').textContent = biggest.name;
  }

  // Update sort indicators
  document.querySelectorAll('#shares-table thead th').forEach(th => {
    const col = th.getAttribute('onclick')?.match(/sortSharesBy\('(\w+)'\)/)?.[1];
    if (!col) return;
    th.classList.toggle('sort-asc',  S.shareSort.col === col && S.shareSort.dir === 'asc');
    th.classList.toggle('sort-desc', S.shareSort.col === col && S.shareSort.dir === 'desc');
    const icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = S.shareSort.col === col ? (S.shareSort.dir === 'asc' ? '↑' : '↓') : '↕';
  });

  if (!shares.length) {
    document.getElementById('shares-body').innerHTML =
      `<tr><td colspan="5"><div class="empty-state">${t('no_shares')}</div></td></tr>`;
    return;
  }

  document.getElementById('shares-body').innerHTML = shares.map(s => {
    const volTotal = getVolumeTotal(s.path);
    const denom    = volTotal || totalB || 1;
    const pct      = Math.min(100, (s.size_bytes / denom * 100));
    const color    = pct > 80 ? 'var(--danger)' : pct > 60 ? 'var(--warning)' : 'var(--primary)';
    const volInfo  = volTotal ? S.volumes[s.base || s.path.split('/').slice(0,2).join('/')] : null;
    const subtitle = volInfo
      ? t('volume_info', { total: fmtBytes(volInfo.total_bytes), free: fmtBytes(volInfo.free_bytes) })
      : '';
    return `<tr title="${esc(subtitle)}">
      <td><strong>${esc(s.name)}</strong></td>
      <td class="cell-muted cell-mono">${esc(s.path)}</td>
      <td><strong>${esc(s.size_human)}</strong></td>
      <td class="cell-mono">${s.size_gb}</td>
      <td>
        <div class="bar-wrap">
          <div class="bar-bg"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div></div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${pct.toFixed(1)}%${volTotal ? '' : ' *'}</div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ===================== EXCEL =====================
function calcBilling(row, headers) {
  const mCol = findCol(headers, 'mailbox');
  const gCol = findCol(headers, 'gebruik', 'used');
  if (!mCol || !gCol) return null;
  const m = parseFloat(row[mCol]) || 0;
  const g = parseFloat(row[gCol]) || 0;
  const gb = parseFloat(S.settings.mailbox_gb ?? 10);
  return Math.round(g - (gb * m));
}

function getSortedDisplayOrder() {
  const idx = S.editBuffer.map((_, i) => i);
  if (!S.sortCol) return idx;
  return idx.sort((ia, ib) => {
    const va = S.editBuffer[ia][S.sortCol] ?? '';
    const vb = S.editBuffer[ib][S.sortCol] ?? '';
    const na = parseFloat(va), nb = parseFloat(vb);
    let cmp = (!isNaN(na) && !isNaN(nb)) ? na - nb : String(va).localeCompare(String(vb), undefined, {numeric:true});
    return S.sortDir === 'asc' ? cmp : -cmp;
  });
}

async function loadExcel() {
  try {
    const d = await GET('/api/excel/current');
    S.excel      = d;
    S.editBuffer = d.rows ? d.rows.map(r => ({...r})) : [];
    renderExcel();
    setDirty(false);
    document.getElementById('sync-btn').disabled = !S.shares.length || !S.editBuffer.length;
  } catch(e) {
    toast(t('save_failed') + e.message, 'error');
  }
}

function renderExcel() {
  const headers     = S.excel.headers || [];
  const meta        = S.excel._meta   || {};
  const facturenCol = findCol(headers, 'factuur', 'factureren', 'invoice');
  const mailboxCol  = findCol(headers, 'mailbox');
  const gebruiktCol = findCol(headers, 'gebruik', 'used');

  // Meta bar
  const metaEl = document.getElementById('excel-meta');
  const parts  = [];
  if (meta.original_filename) parts.push(meta.original_filename);
  if (meta.uploaded_at) parts.push(fmtDate(meta.uploaded_at));
  if (meta.saved_at)    parts.push(fmtDate(meta.saved_at));
  parts.push(`${S.editBuffer.length} rows`);
  metaEl.textContent = parts.join('  •  ');

  if (!headers.length) {
    document.getElementById('excel-thead').innerHTML = '';
    document.getElementById('excel-tbody').innerHTML =
      `<tr><td colspan="10" class="empty-state">${t('no_data')}</td></tr>`;
    return;
  }

  // THEAD — sortable + resizable
  const thead = document.getElementById('excel-thead');
  thead.innerHTML = '<tr>' +
    headers.map(h => {
      const isSorted = S.sortCol === h;
      const icon = isSorted ? (S.sortDir === 'asc' ? '↑' : '↓') : '↕';
      const sortClass = isSorted ? (S.sortDir === 'asc' ? 'sort-asc' : 'sort-desc') : '';
      const w = S.colWidths[h] ? `width:${S.colWidths[h]}px;min-width:${S.colWidths[h]}px;` : '';
      return `<th class="${sortClass}" data-col="${esc(h)}" style="${w}cursor:pointer">
        <div class="th-inner">
          <span class="th-text" title="${esc(h)}">${esc(h)}</span>
          <span class="sort-icon">${icon}</span>
        </div>
        <div class="resize-handle"></div>
      </th>`;
    }).join('') +
    `<th class="no-sort" style="width:160px"><div class="th-inner"><span class="th-text">${t('col_nas_link')}</span></div></th>` +
    `<th class="no-sort" style="width:36px"></th>` +
  '</tr>';

  // Wire up sort and resize handlers
  thead.querySelectorAll('th[data-col]').forEach(th => {
    const h = th.dataset.col;
    th.addEventListener('click', e => { if (!e.target.classList.contains('resize-handle')) sortExcel(h); });
    const handle = th.querySelector('.resize-handle');
    if (handle) {
      handle.addEventListener('click', e => e.stopPropagation());
      handle.addEventListener('mousedown', e => startColResize(e, th, h));
    }
    // Reapply stored width + truncation
    if (S.colWidths[h]) applyColWidth(th, h, S.colWidths[h]);
  });

  // TBODY — sorted
  const order = getSortedDisplayOrder();
  document.getElementById('excel-tbody').innerHTML = order.map(origIdx => {
    const row = S.editBuffer[origIdx];
    const billing = facturenCol ? calcBilling(row, headers) : null;

    const cells = headers.map(h => {
      const v   = row[h] ?? '';
      const unit = getUnit(h);
      if (h === facturenCol) {
        const disp = billing !== null ? billing : v;
        return `<td class="col-calc" style="text-align:right">
          ${disp !== '' && disp !== null ? `${esc(String(disp))} <span style="color:var(--muted);font-size:11px">GB</span>` : ''}
        </td>`;
      }
      const isNum = !isNaN(parseFloat(v)) && h !== headers[0]; // don't number-input sequence col if 1st
      const inputType = (isNum && (unit || h === mailboxCol || h === findCol(headers,'licent','licentie'))) ? 'number' : 'text';
      const cellHtml = unit
        ? `<div class="cell-with-unit">
             <input type="${inputType}" value="${esc(String(v))}" data-row="${origIdx}" data-col="${esc(h)}"
               onchange="cellChanged(${origIdx},'${esc(h)}',this.value)"
               oninput="cellChanged(${origIdx},'${esc(h)}',this.value)">
             <span class="cell-unit">${unit}</span>
           </div>`
        : `<input type="${inputType}" value="${esc(String(v))}" data-row="${origIdx}" data-col="${esc(h)}"
             onchange="cellChanged(${origIdx},'${esc(h)}',this.value)"
             oninput="cellChanged(${origIdx},'${esc(h)}',this.value)">`;
      return `<td>${cellHtml}</td>`;
    }).join('');

    const shareSel = S.shares.length
      ? `<select onchange="shareLinked(${origIdx},this.value)">
           <option value="">${t('no_link')}</option>
           ${S.shares.map(s => `<option value="${esc(s.name)}" ${row._share===s.name?'selected':''}>${esc(s.name)} (${esc(s.size_human)})</option>`).join('')}
         </select>`
      : `<span style="color:var(--muted);font-size:12px">—</span>`;

    return `<tr id="erow-${origIdx}">
      ${cells}
      <td class="col-nas">${shareSel}</td>
      <td><button class="btn-icon row-delete btn-sm" onclick="deleteRow(${origIdx})" title="✕">✕</button></td>
    </tr>`;
  }).join('');
}

function sortExcel(col) {
  if (S.sortCol === col) S.sortDir = S.sortDir === 'asc' ? 'desc' : 'asc';
  else { S.sortCol = col; S.sortDir = 'asc'; }
  renderExcel();
}

function startColResize(e, th, header) {
  e.preventDefault();
  const startX = e.clientX, startW = th.offsetWidth;
  const onMove = mv => {
    const newW = Math.max(40, startW + mv.clientX - startX);
    th.style.width = th.style.minWidth = newW + 'px';
    applyColWidth(th, header, newW);
  };
  const onUp = () => {
    S.colWidths[header] = th.offsetWidth;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function applyColWidth(th, header, width) {
  const span = th.querySelector('.th-text');
  if (!span) return;
  if (width < 75) {
    // Truncate and show full name on hover
    span.style.cssText = `max-width:${Math.max(8, width-28)}px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle`;
    span.title = header;
  } else {
    span.style.cssText = '';
    span.title = header;
  }
}

function cellChanged(origIdx, col, val) {
  S.editBuffer[origIdx][col] = (val === '' ? null : (isNaN(+val) ? val : +val));
  // Update the calculated billing cell for this row
  const headers    = S.excel.headers || [];
  const facturenCol = findCol(headers, 'factuur', 'factureren', 'invoice');
  if (facturenCol) {
    const billing = calcBilling(S.editBuffer[origIdx], headers);
    const tr = document.getElementById(`erow-${origIdx}`);
    if (tr) {
      const calcCell = tr.querySelector('.col-calc');
      if (calcCell) calcCell.innerHTML = billing !== null
        ? `${billing} <span style="color:var(--muted);font-size:11px">GB</span>` : '';
    }
  }
  setDirty(true);
}

function shareLinked(origIdx, shareName) {
  S.editBuffer[origIdx]._share = shareName || null;
  setDirty(true);
}

function addRow() {
  const headers = S.excel.headers || [];
  if (!headers.length) { toast(t('no_data'), 'warning'); return; }
  const row = {};
  headers.forEach(h => { row[h] = null; });
  const maxSeq = S.editBuffer.reduce((m, r) => { const n = parseInt(r[headers[0]]); return isNaN(n) ? m : Math.max(m, n); }, 0);
  row[headers[0]] = maxSeq + 1;
  row._share = null;
  S.editBuffer.push(row);
  S.sortCol = null; // reset sort so new row appears at bottom
  renderExcel();
  setDirty(true);
}

function deleteRow(origIdx) {
  showConfirm(t('delete_row_title'), t('delete_row_msg'), () => {
    S.editBuffer.splice(origIdx, 1);
    renderExcel();
    setDirty(true);
  });
}

async function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const fd = new FormData();
  fd.append('file', file);
  try {
    toast(t('uploading'));
    const res = await UPLOAD('/api/excel/upload', fd);
    S.excel      = res.data;
    S.editBuffer = res.data.rows.map(r => ({...r}));
    S.sortCol    = null;
    renderExcel();
    setDirty(false);
    document.getElementById('sync-btn').disabled = !S.shares.length;
    toast(t('upload_success'), 'success');
    if (res.mapping_diff && res.mapping_diff.has_diff) showMappingDiff(res.mapping_diff);
  } catch(e) {
    toast(t('upload_failed') + e.message, 'error');
  }
}

async function saveExcel() {
  try {
    await POST('/api/excel/save', { ...S.excel, rows: S.editBuffer });
    S.excel.rows = S.editBuffer.map(r => ({...r}));
    setDirty(false);
    toast(t('save_success'), 'success');
    await autoSaveMappings();
  } catch(e) {
    toast(t('save_failed') + e.message, 'error');
  }
}

async function exportExcel() {
  if (S.dirty) await saveExcel();
  window.location.href = '/api/excel/export';
}

async function syncFromNAS() {
  if (!S.shares.length) await loadShares();
  const headers     = S.excel.headers || [];
  const gebruiktCol = findCol(headers, 'gebruik', 'used');
  if (!gebruiktCol) { toast(t('sync_no_links'), 'warning'); return; }

  const shareMap = {};
  S.shares.forEach(s => { shareMap[s.name] = s; });

  let updated = 0;
  S.editBuffer.forEach((row, ri) => {
    if (!row._share || !shareMap[row._share]) return;
    row[gebruiktCol] = shareMap[row._share].size_gb;
    updated++;
    const tr = document.getElementById(`erow-${ri}`);
    if (tr) { tr.classList.remove('row-synced'); void tr.offsetWidth; tr.classList.add('row-synced'); }
  });

  if (!updated) { toast(t('sync_no_links'), 'warning'); return; }
  renderExcel();
  setDirty(true);
  toast(`${updated}${t('rows_updated')}`, 'success');
}

async function autoSaveMappings() {
  const headers = S.excel.headers || [];
  const keyCol  = findCol(headers, 'klant', 'naam', 'customer') || findCol(headers, 'contract');
  const nameCol = findCol(headers, 'klant', 'naam', 'customer');
  if (!keyCol) return;
  const updates = S.editBuffer
    .filter(r => r._share && String(r[keyCol] || '').trim())
    .map(r => ({
      key:   String(r[keyCol]).trim().toLowerCase(),
      name:  String(r[nameCol] || r[keyCol] || '').trim(),
      share: r._share,
    }));
  if (!updates.length) return;
  try {
    const res = await POST('/api/mappings/save', { key_col: keyCol, updates, remove: [] });
    S.mappings = res.mappings;
  } catch(_) { /* silent */ }
}

// ===================== MAPPING DIFF MODAL =====================
function showMappingDiff(diff) {
  S.pendingDiff = diff;
  let html = '';
  if (diff.applied.length) {
    html += `<div class="diff-section diff-applied">
      <div class="diff-section-title">${t('diff_applied')} (${diff.applied.length})</div>
      ${diff.applied.map(a => `<div class="diff-item">
        <div class="diff-item-name">${esc(a.name)}<small>${esc(a.share||'—')}</small></div>
      </div>`).join('')}
    </div>`;
  }
  if (diff.new.length) {
    html += `<div class="diff-section diff-new">
      <div class="diff-section-title">${t('diff_new')}</div>
      ${diff.new.map((n,i) => `<div class="diff-item">
        <div class="diff-item-name">${esc(n.name)}<small>${esc(n.key)}</small></div>
        <select id="diff-new-${i}" data-key="${esc(n.key)}" data-name="${esc(n.name)}">
          <option value="">${t('no_link')}</option>
          ${S.shares.map(s => `<option value="${esc(s.name)}">${esc(s.name)} (${esc(s.size_human)})</option>`).join('')}
        </select>
      </div>`).join('')}
    </div>`;
  }
  if (diff.removed.length) {
    html += `<div class="diff-section diff-removed">
      <div class="diff-section-title">${t('diff_removed')}</div>
      ${diff.removed.map((r,i) => `<div class="diff-item">
        <div class="diff-item-name">${esc(r.name)}<small>${esc(r.key)} → ${esc(r.share||'—')}</small></div>
        <label style="font-size:12px;white-space:nowrap">
          <input type="checkbox" id="diff-keep-${i}" data-key="${esc(r.key)}" checked> ${t('keep')}
        </label>
      </div>`).join('')}
    </div>`;
  }
  if (diff.changed.length) {
    html += `<div class="diff-section diff-changed">
      <div class="diff-section-title">${t('diff_changed')}</div>
      ${diff.changed.map(c => `<div class="diff-item">
        <div class="diff-item-name">"${esc(c.old_name)}" → "${esc(c.new_name)}"<small>${esc(c.share||'—')}</small></div>
      </div>`).join('')}
    </div>`;
  }
  document.getElementById('mapping-diff-content').innerHTML = html;
  document.getElementById('mapping-modal').classList.remove('hidden');
}

function closeMappingModal() {
  document.getElementById('mapping-modal').classList.add('hidden');
  S.pendingDiff = null;
}

async function saveMappingDecision() {
  const diff = S.pendingDiff;
  if (!diff) { closeMappingModal(); return; }
  const updates = [], remove = [];
  (diff.new || []).forEach((n, i) => {
    const sel = document.getElementById(`diff-new-${i}`);
    updates.push({ key: n.key, name: n.name, share: sel ? sel.value : '' });
  });
  (diff.removed || []).forEach((r, i) => {
    const chk = document.getElementById(`diff-keep-${i}`);
    (chk && chk.checked) ? updates.push({ key: r.key, name: r.name, share: r.share }) : remove.push(r.key);
  });
  (diff.changed || []).forEach(c => updates.push({ key: c.key, name: c.new_name, share: c.share }));
  try {
    const res = await POST('/api/mappings/save', { key_col: diff.key_col, updates, remove });
    S.mappings = res.mappings;
    const keyCol = diff.key_col;
    if (keyCol) {
      updates.forEach(u => {
        if (!u.share) return;
        const row = S.editBuffer.find(r => String(r[keyCol]||'').trim().toLowerCase() === u.key);
        if (row) row._share = u.share;
      });
      renderExcel();
    }
    toast(t('links_saved'), 'success');
    closeMappingModal();
  } catch(e) {
    toast(t('links_failed') + e.message, 'error');
  }
}

// ===================== HISTORY =====================
function showHistoryTab(tab, el) {
  document.querySelectorAll('.htab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('history-uploads').style.display  = tab === 'uploads'  ? '' : 'none';
  document.getElementById('history-edits').style.display    = tab === 'edits'    ? '' : 'none';
  document.getElementById('history-mappings').style.display = tab === 'mappings' ? '' : 'none';
}

async function loadHistory() {
  try {
    const [hist, mapHist] = await Promise.all([GET('/api/history'), GET('/api/mappings/history')]);
    S.history = { ...hist, mappings: mapHist.snapshots || [] };
    renderHistory();
  } catch(e) {
    toast(t('save_failed') + e.message, 'error');
  }
}

function renderHistory() {
  renderHistoryList('history-uploads', S.history.uploads, 'upload');
  renderHistoryList('history-edits',   S.history.edits,   'edit');
  renderMappingHistory();
}

function renderHistoryList(id, items, type) {
  const el = document.getElementById(id);
  if (!items || !items.length) { el.innerHTML = `<div class="empty-state">${t('no_history')}</div>`; return; }
  el.innerHTML = items.map(item => {
    const meta  = item.meta || {};
    const tag   = type === 'upload' ? 'upload' : (meta.source?.includes('restore') ? 'restore' : 'edit');
    const label = { upload:'Upload', edit:'Edit', restore:'Restore' }[tag] ?? tag;
    const rows  = meta.row_count ?? '?';
    const sub   = [fmtDate(item.modified), meta.original_filename, `${rows} rows`].filter(Boolean).join('  •  ');
    return `<div class="history-item">
      <div class="history-info"><div class="history-title">${esc(item.filename)}</div><div class="history-sub">${esc(sub)}</div></div>
      <div class="history-actions">
        <span class="tag tag-${tag}">${label}</span>
        <button class="btn-secondary btn-sm" onclick="restoreVersion('${type}','${esc(item.id)}','${esc(item.filename)}')">${t('restore')}</button>
      </div>
    </div>`;
  }).join('');
}

function renderMappingHistory() {
  const el    = document.getElementById('history-mappings');
  const items = S.history.mappings || [];
  if (!items.length) { el.innerHTML = `<div class="empty-state">${t('no_history')}</div>`; return; }
  el.innerHTML = items.map(item => `
    <div class="history-item">
      <div class="history-info"><div class="history-title">${esc(item.filename)}</div><div class="history-sub">${fmtDate(item.modified)}  •  ${item.count} links</div></div>
      <div class="history-actions">
        <span class="tag tag-edit">${t('mappings_tab')}</span>
        <button class="btn-secondary btn-sm" onclick="restoreMappings('${esc(item.id)}','${esc(item.filename)}')">${t('restore')}</button>
      </div>
    </div>`).join('');
}

async function restoreVersion(type, id, filename) {
  showConfirm(t('restore_title'), t('restore_msg', {name: filename}), async () => {
    try {
      const url = type === 'upload'
        ? `/api/history/restore/upload/${encodeURIComponent(id)}`
        : `/api/history/restore/edit/${encodeURIComponent(id)}`;
      const res = await POST(url, {});
      S.excel = res.data; S.editBuffer = res.data.rows.map(r => ({...r})); S.sortCol = null;
      setDirty(false);
      toast(t('save_success'), 'success');
      loadHistory();
    } catch(e) { toast(t('save_failed') + e.message, 'error'); }
  });
}

async function restoreMappings(id, filename) {
  showConfirm(t('restore_map_title'), t('restore_map_msg', {name: filename}), async () => {
    try {
      const res = await POST(`/api/mappings/restore/${encodeURIComponent(id)}`, {});
      S.mappings = res.mappings;
      applyMappingsToBuffer();
      toast(t('restore_links_success'), 'success');
      loadHistory();
    } catch(e) { toast(t('restore_links_failed') + e.message, 'error'); }
  });
}

function applyMappingsToBuffer() {
  const headers = S.excel.headers || [];
  const keyCol  = findCol(headers, 'klant', 'naam', 'customer') || findCol(headers, 'contract');
  if (!keyCol || !S.mappings.map) return;
  S.editBuffer.forEach(row => {
    const key   = String(row[keyCol] || '').trim().toLowerCase();
    const entry = S.mappings.map[key];
    if (entry && entry.share) row._share = entry.share;
  });
  renderExcel();
  setDirty(true);
}

// ===================== SETTINGS =====================
async function loadSettings() {
  try {
    S.settings = await GET('/api/settings');
    renderSettings();
  } catch(e) { toast(t('save_failed') + e.message, 'error'); }
}

function renderSettings() {
  const cfg = S.settings;
  document.getElementById('share-paths-list').innerHTML =
    (cfg.share_paths || []).map((p, i) => `<div class="list-item"><span>${esc(p)}</span><button class="btn-danger btn-sm" onclick="removeSharePath(${i})">✕</button></div>`).join('');
  document.getElementById('exclude-list').innerHTML =
    (cfg.exclude_shares || []).map((p, i) => `<div class="list-item"><span>${esc(p)}</span><button class="btn-danger btn-sm" onclick="removeExclude(${i})">✕</button></div>`).join('');
  ['upload','edit'].forEach(type => {
    const sel = document.getElementById(`${type}-retention`);
    const val = String(cfg[`${type}_retention`] || 10);
    Array.from(sel.options).forEach(o => { o.selected = o.value === val; });
    if (!Array.from(sel.options).some(o => o.selected)) {
      const opt = document.createElement('option');
      opt.value = val; opt.textContent = val; opt.selected = true; sel.appendChild(opt);
    }
  });
  document.getElementById('mailbox-gb').value = cfg.mailbox_gb ?? 10;
}

function addSharePath() {
  const v = document.getElementById('new-share-path').value.trim();
  if (!v) return;
  S.settings.share_paths = [...(S.settings.share_paths||[]), v];
  document.getElementById('new-share-path').value = '';
  renderSettings();
}
function removeSharePath(i) { S.settings.share_paths.splice(i,1); renderSettings(); }
function addExclude() {
  const v = document.getElementById('new-exclude').value.trim();
  if (!v) return;
  S.settings.exclude_shares = [...(S.settings.exclude_shares||[]), v];
  document.getElementById('new-exclude').value = '';
  renderSettings();
}
function removeExclude(i) { S.settings.exclude_shares.splice(i,1); renderSettings(); }

async function saveSettings() {
  try {
    const res = await POST('/api/settings', {
      share_paths:      S.settings.share_paths,
      exclude_shares:   S.settings.exclude_shares,
      upload_retention: parseInt(document.getElementById('upload-retention').value),
      edit_retention:   parseInt(document.getElementById('edit-retention').value),
      mailbox_gb:       parseFloat(document.getElementById('mailbox-gb').value) || 10,
    });
    S.settings = res.config;
    renderSettings();
    toast(t('settings_saved'), 'success');
  } catch(e) { toast(t('save_failed') + e.message, 'error'); }
}

// ===================== INIT =====================
document.addEventListener('DOMContentLoaded', () => {
  lang = getLangFromEnv();
  setLang(lang); // applies i18n + marks active button

  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => showTab(el.dataset.tab));
  });
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });
  document.getElementById('mapping-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('mapping-modal')) closeMappingModal();
  });
  window.addEventListener('beforeunload', e => {
    if (S.dirty) { e.preventDefault(); e.returnValue = ''; }
  });

  GET('/api/mappings').then(d => { S.mappings = d; }).catch(() => {});
  loadShares();
});
</script>
